<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D++ Programming Language</title>
    <style>
        :root { --bg: #0d1117; --accent: #58a6ff; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; line-height: 1.6; margin: 0; padding: 0; }
        .hero { text-align: center; padding: 100px 20px; background: linear-gradient(180deg, #161b22 0%, #0d1117 100%); }
        h1 { font-size: 4rem; margin: 0; color: #fff; letter-spacing: -2px; }
        .download-btn { display: inline-block; background: var(--accent); color: #fff; padding: 15px 30px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        .download-btn:hover { background: #1f6feb; transform: translateY(-2px); }
        .code-box { background: #010409; border: 1px solid #30363d; border-radius: 6px; padding: 20px; max-width: 600px; margin: 40px auto; text-align: left; overflow-x: auto; }
        pre { margin: 0; color: #79c0ff; font-family: 'Consolas', monospace; }
        span.keyword { color: #ff7b72; }
        span.string { color: #a5d6ff; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>D++</h1>
        <p>A high-performance, forgiving language built for speed.</p>
        <a href="https://github.com/HydrogenClient/DPP/raw/main/dpp-0.1.0-x86_64-Installer.exe" class="download-btn">Download for Windows (x64)</a>
    </div>

    <div class="code-box">
        <pre>
<span class="keyword">main</span>() {
    <span class="keyword">std::print</span> < <span class="string">"Hello, D++ World!"</span>
}</pre>
    </div>
</body>
</html>
